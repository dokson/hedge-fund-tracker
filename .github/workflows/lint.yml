name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege GITHUB_TOKEN: lint only needs to read the checkout.
permissions:
  contents: read

# Cancel in-progress runs on the same branch when new commits land
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python · Ruff + pyright + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PIPENV_VENV_IN_PROJECT: "1"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.13"

      - name: Cache pipenv virtualenv
        uses: actions/cache@v6
        with:
          path: .venv
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}

      - name: Install pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dev dependencies
        run: pipenv sync --dev

      - name: Ruff check
        run: pipenv run ruff check . --output-format=github

      - name: Ruff format check
        run: pipenv run ruff format --check .

      - name: Pyright
        run: pipenv run pyright

      - name: mypy
        run: pipenv run mypy app database scripts

      - name: Dependency vulnerability audit (pip-audit)
        run: |
          pipenv requirements --dev > requirements-audit.txt
          pipenv run pip install pip-audit
          pipenv run pip-audit --requirement requirements-audit.txt

  frontend:
    name: Frontend · oxlint + Prettier + tsc
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: oxlint
        run: npx oxlint --type-aware --deny-warnings

      - name: Prettier check
        run: npx prettier --check .

      - name: TypeScript type check
        run: npx tsc -b --noEmit
