name: Tests

on:
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest

    env:
      PIPENV_VENV_IN_PROJECT: "1"

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pipenv virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pipenv-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipenv
          pipenv install --dev

      - name: Run Python tests
        run: pipenv run python -m unittest discover
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "app/frontend/package-lock.json"

      - name: Install frontend dependencies
        run: cd app/frontend && npm ci

      - name: Run frontend tests
        run: cd app/frontend && npm test

  summary:
    runs-on: ubuntu-latest
    needs: [python-tests, frontend-tests]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.python-tests.result }}" == "success" && "${{ needs.frontend-tests.result }}" == "success" ]]; then
            echo "✅ All tests passed successfully!"
          else
            echo "❌ Some tests failed. Please check the logs above."
            exit 1
          fi
