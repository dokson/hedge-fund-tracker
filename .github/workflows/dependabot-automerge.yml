name: Dependabot Auto-Merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "app/frontend/package-lock.json"

      - name: Install and build frontend
        run: cd app/frontend && npm ci --legacy-peer-deps && npm run build

      - name: Approve and auto-merge PR
        run: |
          gh pr review --approve "$PR_URL"
          SUBJECT="chore(deps): ${{ steps.metadata.outputs.dependency-names }}"
          BODY="Auto-merged ${{ steps.metadata.outputs.update-type }} update"
          # Try --auto first (queues the merge behind pending required checks).
          # If GitHub rejects it (e.g. no pending checks to wait on, or
          # auto-merge not enabled on the repo), fall back to an immediate
          # squash merge.
          if ! gh pr merge --auto --squash "$PR_URL" \
                --subject "$SUBJECT" --body "$BODY" --delete-branch; then
            echo "::notice::--auto rejected, attempting immediate merge"
            gh pr merge --squash "$PR_URL" \
              --subject "$SUBJECT" --body "$BODY" --delete-branch
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
