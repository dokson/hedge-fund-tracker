[tool.ruff]
target-version = "py313"
line-length = 100
extend-exclude = [
    "__llmcache__",
    "__reports__",
    "database",
    "app/frontend",
    ".venv",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RET", # flake8-return
    "PTH", # flake8-use-pathlib
    "N",   # pep8-naming
    "G",   # flake8-logging-format — no f-string / .format in logger calls; forces lazy %-formatting
]
ignore = [
    "E501",  # line-too-long (formatter handles it)
    "B008",  # do not perform function call in argument defaults (FastAPI Depends pattern)
    "N803",  # argument name should be lowercase (DataFrame columns often PascalCase)
    "N806",  # variable in function should be lowercase (idem)
    "G201",  # use .exception() instead of .error(..., exc_info=True) — stylistic, not security
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["N802"]  # test method names can deviate from pep8

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
exclude = [
    "app/frontend",
    "__llmcache__",
    "__reports__",
    "build",
    "dist",
]
