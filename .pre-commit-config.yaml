# Run on commit: `pre-commit install` once, then it's automatic.
# Run manually on all files: `pre-commit run --all-files`
# Update hook versions: `pre-commit autoupdate`

default_install_hook_types: [pre-commit, commit-msg, pre-push]
fail_fast: false

repos:
  # Python: lint + format with Ruff (single tool, super fast)
  # pre-commit stage: auto-fix and reformat (mutates files)
  # pre-push stage: read-only check (fails if anything is dirty — CI safety net)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.16.0
    hooks:
      - id: ruff-check
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]
      - id: ruff-check
        alias: ruff-check-strict
        name: ruff check (pre-push, no fix)
        stages: [pre-push]
      - id: ruff-format
        alias: ruff-format-check
        name: ruff format --check (pre-push)
        args: [--check]
        stages: [pre-push]

  # mypy + pyright: NOT in pre-commit (per-commit is too slow and mirrors-mypy
  # version-drifts vs pipenv's locked stubs). They run on PUSH instead, via the
  # local hook at the bottom of this file (scripts/run_typechecks.py), which
  # resolves pipenv robustly and runs them against the project venv — the same
  # versions CI uses. CI (lint.yml) remains the source of truth.

  # Frontend: format with Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^app/frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
        additional_dependencies:
          - prettier@3.9.6

  # NOTE: oxlint + tsc are NOT in pre-commit by design.
  # They require `cd app/frontend && npx ...`, which doesn't run cross-platform
  # via pre-commit's hook system (bash unavailable on Windows native).
  # CI (.github/workflows/lint.yml) runs them on every push/PR — that's the
  # source of truth. Run them locally with: `cd app/frontend && npm run lint`.

  # General hygiene.
  # NOTE: database/ is excluded from line-ending / whitespace normalization —
  # those CSVs are bot-managed (filings-fetch action) and reformatting them
  # creates massive noise diffs unrelated to actual data changes.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(database/.*\.csv|.*\.md)$
      - id: end-of-file-fixer
        exclude: ^database/.*\.csv$
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^database/.*\.csv$
      - id: check-yaml
      - id: check-toml
      - id: check-json
        # tsconfig*.json files are JSONC (allow comments) — check-json is strict JSON only
        exclude: ^app/frontend/tsconfig.*\.json$
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: ^(database/|app/frontend/package-lock\.json|Pipfile\.lock)
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key

  # Conventional Commits enforcement on commit-msg
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - chore
          - docs
          - refactor
          - test
          - perf
          - ci
          - build
          - style
          - revert

  # Pre-push: run the same checks CI runs, so we never push a broken build.
  # Skip with `git push --no-verify` if you really need to (don't).
  # NOTE: ruff (check + format) for Python is at the top of this file with
  # stages: [pre-push]. Here we add the checks that need a runtime on PATH:
  # pyright + mypy (via pipenv) and the frontend check (via npm).
  - repo: local
    hooks:
      - id: typecheck
        name: pyright + mypy + unittest (pre-push)
        entry: python scripts/run_typechecks.py
        language: system
        stages: [pre-push]
        pass_filenames: false
      - id: frontend-check
        name: frontend lint + type-check + format check (pre-push)
        entry: npm run --prefix app/frontend check
        language: system
        stages: [pre-push]
        pass_filenames: false
      - id: frontend-tests
        name: frontend tests (pre-push)
        entry: npm test --prefix app/frontend -- --run
        language: system
        stages: [pre-push]
        pass_filenames: false
